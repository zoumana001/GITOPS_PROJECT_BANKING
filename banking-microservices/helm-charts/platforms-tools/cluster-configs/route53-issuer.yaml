apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: your-email@zoumanas.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - selector:
        dnsZones:
          - "zoumanas.com"
      dns01:
        route53:
          region: us-east-1
          hostedZoneID: Z080012215SKSZBCVRWYZ # Find this in Route 53 Console

{{- range $name, $svc := (dict "accountService" .Values.accountService "transactionService" .Values.transactionService "transferService" .Values.transferService) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $svc.name }}
    environment: production
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
        environment: production
    spec:
      containers:
      - name: {{ $svc.name }}
        image: {{ $svc.image.repository }}:{{ $svc.image.tag }}
        ports:
        - containerPort: {{ $svc.port }}
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/{{ $name | lower }}/health
            port: {{ $svc.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/{{ $name | lower }}/health
            port: {{ $svc.port }}
          initialDelaySeconds: 15
          periodSeconds: 5
{{- end }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: banking
  source:
    repoURL: https://github.com/zoumana001/GITOPS_PROJECT_BANKING.git
    targetRevision: main
    path: banking-project/banking-microservices/helm-charts/platforms-tools/prometheus-stack
    helm:
      valueFiles:
        - values.yaml
      skipCrds: true            # skip CRDs - already installed manually
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
        - /status

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zoumana001/GITOPS_PROJECT_BANKING.git
    targetRevision: main
    path: banking-microservices/helm-charts/platforms-tools/cluster-configs
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager # Issuers usually live where cert-manager is
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
